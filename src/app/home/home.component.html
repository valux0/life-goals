<div class="container">
  <div class="input-section">
    <p>Agrega una meta!</p>
    <input [(ngModel)]="nuevaMeta" placeholder="escribe tu meta" />
    <button (click)="agregar()">guardar</button>
  </div>

  <div class="list-section">
    <p>Tu lista de metas ({{ listaMetas.length }})</p>
    <div *ngFor="let m of listaMetas" class="card">
      <button class="btn-delete" (click)="eliminar(m.id!)">borrar</button>
      <p>{{ m.meta }}</p>
    </div>
  </div>
</div>
