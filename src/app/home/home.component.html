<div class="container">
  <div class="input-section">
    <p>Use this form below to add a new life goal</p>
    <input [(ngModel)]="nuevaMeta" placeholder="go to moon" />
    <button (click)="agregar()">add an item</button>
  </div>

  <div class="list-section">
    <p>Your goal list ({{ listaMetas.length }})</p>
    <div *ngFor="let m of listaMetas" class="card">
      <button class="btn-delete" (click)="eliminar(m.id!)">delete</button>
      <p>{{ m.meta }}</p>
    </div>
  </div>
</div>
